<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ze Tableau</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap');
:root{--bg:#0e0d0b;--surface:#1a1814;--gold:#c9a84c;--gold-dim:#7a6230;--cream:#f0e8d5;--muted:#4a4540;--text:#d4c9b0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:1.5rem 1rem 3rem;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.07) 0%,transparent 60%);pointer-events:none;}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,5vw,2rem);color:var(--gold);letter-spacing:.08em;text-align:center;margin-bottom:.2rem;font-style:italic;}
.subtitle{font-size:.58rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem;text-align:center;}
.nav-tabs{display:flex;border:1px solid var(--gold-dim);border-radius:3px;margin-bottom:1.5rem;overflow:hidden;max-width:500px;margin-left:auto;margin-right:auto;}
.nav-tab{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:9px 4px;cursor:pointer;transition:all .2s;text-align:center;}
.nav-tab.active{background:var(--gold-dim);color:var(--cream);}
.nav-tab:hover:not(.active){color:var(--gold);}
.section{display:none;max-width:700px;margin:0 auto;}
.section.active{display:block;}

/* SECTION HEADER with + button */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.sec-header-title{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.add-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'DM Mono',monospace;font-size:.75rem;padding:2px 10px;cursor:pointer;border-radius:3px;transition:all .2s;line-height:1.4;}
.add-btn:hover{background:var(--gold-dim);color:var(--cream);}

.search-box{width:100%;background:var(--surface);border:1px solid #2a2520;color:var(--text);font-family:'DM Mono',monospace;font-size:.7rem;padding:.6rem .9rem;border-radius:3px;outline:none;margin-bottom:1rem;}
.search-box:focus{border-color:var(--gold-dim);}
.cat-header{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin:1.2rem 0 .5rem;padding-bottom:.3rem;border-bottom:1px solid #2a2520;}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem;margin-bottom:.5rem;}
@media(max-width:400px){.items-grid{grid-template-columns:repeat(2,1fr);}}
.item-card{background:var(--surface);border:1px solid #2a2520;border-radius:3px;padding:.7rem .8rem;cursor:pointer;transition:all .15s;user-select:none;}
.item-card:active{transform:scale(.97);}
.item-card.selected{border-color:var(--gold);background:rgba(201,168,76,.1);}
.item-card.harmony{border-color:#7eb88a;background:rgba(126,184,138,.08);}
.item-card.contrast{border-color:#c97a4c;background:rgba(201,122,76,.08);}
.item-card.dimmed{opacity:.25;}
.item-card.custom-card{border-style:dashed;}
.card-name{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--gold);font-style:italic;margin-bottom:.15rem;}
.card-profile{font-size:.55rem;color:var(--muted);line-height:1.4;}
.card-badge{font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;margin-top:.2rem;}
.card-badge.h{color:#7eb88a;}.card-badge.c{color:#c97a4c;}
.detail-panel{background:var(--surface);border:1px solid var(--gold-dim);border-radius:3px;padding:1.2rem 1.3rem;margin-bottom:1.2rem;}
.detail-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);font-style:italic;margin-bottom:.6rem;}
.detail-type{font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.8rem;}
.detail-type.h{color:#7eb88a;}.detail-type.c{color:#c97a4c;}.detail-type.s{color:var(--gold);}
.detail-row{margin-bottom:.7rem;}
.detail-label{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem;}
.detail-text{font-size:.7rem;color:var(--text);line-height:1.75;opacity:.9;}
.detail-note{font-size:.55rem;color:var(--muted);font-style:italic;margin-top:.4rem;}
.pills{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.25rem;}
.pill{font-size:.6rem;padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .15s;}
.pill:active{transform:scale(.95);}
.pill.h{background:rgba(126,184,138,.12);border:1px solid rgba(126,184,138,.35);color:#7eb88a;}
.pill.c{background:rgba(201,122,76,.12);border:1px solid rgba(201,122,76,.35);color:#c97a4c;}
.pill.s{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--gold);}
.pill.neutral{background:rgba(201,168,76,.08);border:1px solid #2a2520;color:var(--text);cursor:default;}
.back-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;padding:5px 14px;cursor:pointer;transition:all .2s;border-radius:2px;margin-top:.8rem;}
.back-btn:active{background:var(--gold-dim);color:var(--cream);}
.notes-section{margin-top:1rem;border-top:1px solid #2a2520;padding-top:.8rem;}
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.notes-title{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);}
.add-note-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:.6rem;padding:3px 10px;cursor:pointer;transition:all .15s;border-radius:2px;}
.add-note-btn:active{background:var(--gold-dim);color:var(--cream);}
.note-entry{background:rgba(201,168,76,.04);border-left:2px solid var(--gold-dim);padding:.5rem .7rem;margin-bottom:.4rem;border-radius:0 2px 2px 0;position:relative;}
.note-date input[type=date]{background:transparent;border:none;border-bottom:1px solid var(--muted);color:var(--muted);font-family:'DM Mono',monospace;font-size:.52rem;padding:0 2px;outline:none;margin-bottom:.3rem;}
.note-text{font-size:.65rem;color:var(--text);line-height:1.6;width:100%;background:transparent;border:none;resize:none;font-family:'DM Mono',monospace;outline:none;min-height:40px;}
.note-delete{position:absolute;top:.4rem;right:.5rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;opacity:.5;}
.no-notes{font-size:.6rem;color:var(--muted);font-style:italic;opacity:.6;}
.tech-tabs{display:flex;border:1px solid #2a2520;border-radius:3px;margin-bottom:1rem;overflow:hidden;}
.tech-tab{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:8px;cursor:pointer;transition:all .2s;text-align:center;}
.tech-tab.active{background:var(--gold-dim);color:var(--cream);}
.fw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--gold-dim);border-radius:4px;padding:1.4rem;width:100%;max-width:480px;margin-top:2rem;}
.modal-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.05rem;margin-bottom:1rem;font-style:italic;}
.modal-field{margin-bottom:.8rem;}
.modal-field label{font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.3rem;}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;background:rgba(201,168,76,.05);border:1px solid #2a2520;color:var(--text);font-family:'DM Mono',monospace;font-size:.68rem;padding:.4rem .6rem;border-radius:2px;outline:none;}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--gold-dim);}
.modal-field textarea{resize:vertical;min-height:55px;}
.modal-field select option{background:var(--surface);}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem;}
.modal-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:.58rem;padding:6px 14px;cursor:pointer;border-radius:2px;transition:all .2s;}
.modal-btn.primary{background:var(--gold-dim);color:var(--cream);}
.modal-btn:disabled{opacity:.4;cursor:not-allowed;}

/* AI result preview inside modal */
.ai-preview{background:rgba(201,168,76,.05);border:1px solid #2a2520;border-radius:3px;padding:.9rem;margin-top:.8rem;display:none;}
.ai-preview.show{display:block;}
.ai-preview-name{font-family:'Playfair Display',serif;color:var(--gold);font-size:.95rem;font-style:italic;margin-bottom:.4rem;}
.ai-preview-profile{font-size:.65rem;color:var(--text);margin-bottom:.6rem;line-height:1.6;}
.ai-preview-row{font-size:.58rem;color:var(--muted);margin-bottom:.3rem;}
.ai-preview-row span{color:var(--text);}
.loading-dots{display:none;font-size:.65rem;color:var(--muted);text-align:center;padding:.8rem;}
.loading-dots.show{display:block;}
.error-msg{font-size:.62rem;color:#c97a4c;margin-top:.5rem;display:none;}
.error-msg.show{display:block;}
.save-confirm{font-size:.62rem;color:#7eb88a;margin-top:.5rem;display:none;text-align:center;}
.save-confirm.show{display:block;}

/* COMBO OVERLAY */
.combo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto;}
.combo-overlay.open{display:flex;}
.combo-box{background:var(--surface);border:1px solid var(--gold-dim);border-radius:4px;padding:1.3rem;width:100%;max-width:500px;margin-top:2rem;}

.cocktail-card{background:var(--surface);border:1px solid #2a2520;border-radius:3px;padding:.7rem .8rem;cursor:pointer;transition:all .15s;margin-bottom:.4rem;}
.cocktail-card:hover{border-color:var(--gold-dim);}
.cocktail-card-name{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--gold);font-style:italic;}
.cocktail-card-style{font-size:.52rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.15rem;}
.cocktail-ing-list{list-style:none;margin:.3rem 0;}
.cocktail-ing-list li{font-size:.67rem;color:var(--text);padding:.18rem 0;border-bottom:1px solid #1f1d1a;display:flex;justify-content:space-between;}
.cocktail-ing-list li:last-child{border-bottom:none;}
.cocktail-qty{color:var(--gold);font-weight:bold;}
.cocktail-step{font-size:.67rem;color:var(--text);line-height:1.6;padding:.3rem 0 .3rem 1.6rem;border-bottom:1px solid #1f1d1a;position:relative;counter-increment:cstep;}
.cocktail-step:last-child{border-bottom:none;}
.cocktail-step::before{content:counter(cstep);position:absolute;left:0;top:.3rem;width:1.1rem;height:1.1rem;background:var(--gold-dim);color:var(--bg);font-size:.52rem;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.searching-msg{font-size:.68rem;color:var(--muted);text-align:center;padding:1.5rem;font-style:italic;}

.badge-qc{display:inline-flex;align-items:center;gap:3px;font-size:.48rem;letter-spacing:.08em;color:#4a9e6f;margin-top:.25rem;}
.badge-qc svg{width:9px;height:9px;flex-shrink:0;}
</style>
</head>
<body>
<h1>Ze Tableau</h1>
<p class="subtitle">Cocktails & Sirops — Mariages aromatiques</p>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="setTab('ingredients')">Ingrédients</button>
  <button class="nav-tab" onclick="setTab('spirits')">Alcools</button>
  <button class="nav-tab" onclick="setTab('techniques')">Techniques</button>
  <button class="nav-tab" onclick="setTab('cocktails')">Cocktails</button>
</div>

<!-- INGREDIENTS -->
<div class="section active" id="tab-ingredients">
  <div class="sec-header">
    <span class="sec-header-title">Ingrédients</span>
    <button class="add-btn" onclick="openAddModal('ingredient')">+ Ajouter</button>
  </div>
  <input class="search-box" type="text" placeholder="Rechercher..." oninput="filterIngredients(this.value)" id="ing-search">
  <div id="ing-detail"></div>
  <div id="ing-grid"></div>
</div>

<!-- SPIRITS -->
<div class="section" id="tab-spirits">
  <div class="sec-header">
    <span class="sec-header-title">Alcools</span>
    <button class="add-btn" onclick="openAddModal('spirit')">+ Ajouter</button>
  </div>
  <div id="spi-detail"></div>
  <div id="spi-grid"></div>
</div>

<!-- TECHNIQUES -->
<div class="section" id="tab-techniques">
  <div class="tech-tabs">
    <button class="tech-tab active" id="tt-mac" onclick="setTechTab('maceration')">Macération</button>
    <button class="tech-tab" id="tt-fw" onclick="setTechTab('fatwash')">Fat Wash</button>
  </div>
  <div id="tech-mac">
    <div class="sec-header">
      <span class="sec-header-title">Macération</span>
      <button class="add-btn" onclick="openAddModal('maceration')">+ Ajouter</button>
    </div>
    <div id="mac-detail"></div>
    <div id="mac-grid"></div>
  </div>
  <div id="tech-fw" style="display:none;">
    <div class="sec-header">
      <span class="sec-header-title">Fat Wash — Méthode congélateur</span>
      <button class="add-btn" onclick="openAddModal('fatwash')">+ Ajouter</button>
    </div>
    <div id="fw-detail"></div>
    <div id="fw-grid"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Ajouter</div>
    <div class="modal-field">
      <label>Nom</label>
      <input type="text" id="add-name" placeholder="Ex: Lime, Armagnac, Torréfaction..." autocomplete="off">
    </div>
    <div class="modal-field" id="cat-field">
      <label>Catégorie</label>
      <select id="add-cat">
        <option value="auto">Détecter automatiquement</option>
        <option value="fruits">Fruits & Légumes</option>
        <option value="epices">Épices</option>
        <option value="herbes">Herbes</option>
        <option value="umami">Umami / Salé</option>
        <option value="floral">Floral</option>
        <option value="boise">Boisé / Terreux</option>
      </select>
    </div>
    <div class="modal-field" id="tech-type-field" style="display:none;">
      <label>Type de technique</label>
      <select id="add-tech-type">
        <option value="maceration_froide">Macération à froid</option>
        <option value="maceration_chaude">Macération à chaud</option>
        <option value="torrefaction">Torréfaction</option>
        <option value="sous_vide">Sous vide</option>
        <option value="fumee">Fumée / Pistolet</option>
        <option value="autre">Autre</option>
      </select>
    </div>
    <div class="loading-dots" id="modal-loading">Génération en cours...</div>
    <div class="error-msg" id="modal-error"></div>
    <div class="ai-preview" id="ai-preview">
      <div class="ai-preview-name" id="prev-name"></div>
      <div class="ai-preview-profile" id="prev-profile"></div>
      <div class="ai-preview-row" id="prev-row1"></div>
      <div class="ai-preview-row" id="prev-row2"></div>
      <div class="ai-preview-row" id="prev-row3"></div>
    </div>
    <div class="save-confirm" id="save-confirm">✓ Sauvegardé!</div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeAddModal()">Fermer</button>
      <button class="modal-btn" id="regen-btn" onclick="generateItem()" style="display:none;">↺ Regénérer</button>
      <button class="modal-btn primary" id="gen-btn" onclick="generateItem()">✦ Générer</button>
      <button class="modal-btn primary" id="save-btn" onclick="saveItem()" style="display:none;">↓ Sauvegarder</button>
    </div>
  </div>
</div>


<!-- COCKTAILS -->
<div class="section" id="tab-cocktails">
  <div class="sec-header">
    <span class="sec-header-title">Cocktails</span>
    <button class="add-btn" onclick="showSavedCocktails()">★ Mes cocktails</button>
  </div>
  <div style="display:flex;gap:.5rem;margin-bottom:1rem;">
    <input class="search-box" style="margin-bottom:0;flex:1;" type="text" id="cocktail-search" placeholder="Ex: Dark and Stormy, Negroni, Mojito..." autocomplete="off">
    <button class="add-btn" style="white-space:nowrap;" onclick="searchCocktail()">Chercher</button>
  </div>
  <div id="cocktail-result"></div>
  <div id="saved-cocktails-list" style="display:none;">
    <div class="cat-header" style="margin-top:0;">Mes cocktails sauvegardés</div>
    <div id="saved-cocktails-grid"></div>
  </div>
</div>

<!-- COCKTAIL DETAIL OVERLAY -->
<div class="modal-overlay" id="cocktail-overlay">
  <div class="modal-box" style="max-width:520px;max-height:90vh;overflow-y:auto;">
    <div id="cocktail-detail-content"></div>
    <div class="notes-section" style="margin-top:1rem;border-top:1px solid #2a2520;padding-top:.8rem;">
      <div class="notes-header"><span class="notes-title">📋 Mes notes</span><button class="add-note-btn" onclick="addNoteFor('cocktail')">+ Note</button></div>
      <div id="notes-list-cocktail"></div>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.8rem;flex-wrap:wrap;">
      <button class="back-btn" onclick="closeCocktailOverlay()">← Fermer</button>
      <button class="modal-btn primary" id="save-cocktail-btn" onclick="saveCurrentCocktail()" style="font-size:.58rem;">★ Sauvegarder</button>
    </div>
  </div>
</div>

<!-- COMBO OVERLAY -->
<div class="combo-overlay" id="combo-overlay">
  <div class="combo-box">
    <div class="detail-title" id="co-title"></div>
    <div class="detail-type" id="co-type"></div>
    <div class="detail-row"><div class="detail-label">Profil de goût</div><div class="detail-text" id="co-gout"></div></div>
    <div class="detail-row"><div class="detail-label">Suggestion cocktail</div><div class="detail-text" id="co-cocktail"></div></div>
    <div class="detail-note" id="co-auto"></div>
    <div class="notes-section">
      <div class="notes-header"><span class="notes-title">📋 Mes notes</span><button class="add-note-btn" onclick="addNoteFor('combo')">+ Note</button></div>
      <div id="notes-list-combo"></div>
    </div>
    <button class="back-btn" onclick="closeCombo()">← Retour</button>
  </div>
</div>

<script>
const ingredients=[
  {id:'banane',cat:'fruits',label:'Banane',profile:'doux, crémeux, tropical'},
  {id:'mangue',cat:'fruits',label:'Mangue',profile:'charnu, acide-sucré, solaire'},
  {id:'ananas',cat:'fruits',label:'Ananas',profile:'acide vif, juteux, tropical'},
  {id:'fraise',cat:'fruits',label:'Fraise',profile:'fruité franc, légèrement acide'},
  {id:'peche',cat:'fruits',label:'Pêche',profile:'délicat, floral-sucré, estival'},
  {id:'poire',cat:'fruits',label:'Poire',profile:'doux, floral, légèrement acide'},
  {id:'pamplemousse',cat:'fruits',label:'Pampl.',profile:'amer, acide, vif'},
  {id:'citron',cat:'fruits',label:'Citron',profile:'acide vif, zesté, équilibriste'},
  {id:'orange',cat:'fruits',label:'Orange',profile:'rond, légèrement amer, chaleureux'},
  {id:'cerise',cat:'fruits',label:'Cerise',profile:'riche, acide-sucré, profond'},

  {id:'jalapeno',cat:'epices',label:'Jalapeño',profile:'piquant direct, végétal, chaleur franche'},
  {id:'poivre',cat:'epices',label:'Poivre noir',profile:'piquant sec, élégant, long'},
  {id:'espelette',cat:'epices',label:'Piment',profile:'chaleur fruitée, doux-piquant'},
  {id:'vanille',cat:'epices',label:'Vanille',profile:'doux, crémeux, liant universel'},

  {id:'thym',cat:'herbes',label:'Thym',profile:'herbacé-boisé, subtil, provençal'},
  {id:'sauge',cat:'herbes',label:'Sauge',profile:'camphrée, amer doux, rustique'},
  {id:'estragon',cat:'herbes',label:'Estragon',profile:'anisé, élégant, discret'},
  {id:'coriandre',cat:'herbes',label:'Coriandre',profile:'citronné, vert vif, diviseur'},
  {id:'verveine',cat:'herbes',label:'Verveine',profile:'citronné, délicat, apaisant'},
  {id:'cafe',cat:'umami',label:'Café',profile:'amer, torréfié, complexe'},

// ── UTILS ─────────────────────────────────────────────────────────────────────
const catLabels={qc:'🌿 Québec',fruits:'Fruits & Légumes',epices:'Épices',herbes:'Herbes',umami:'Umami / Salé',floral:'Floral',boise:'Boisé / Terreux'};
const catOrder=['qc','fruits','epices','herbes','umami','floral','boise'];
function todayStr(){return new Date().toISOString().split('T')[0];}

function getEffectivePairings(id){
  const allIng=[...ingredients,...customIngredients];
  const allPairings={...pairings};
  customIngredients.forEach(ci=>{if(ci.pairings)allPairings[ci.id]=ci.pairings;});
  const harmony=new Set(allPairings[id]?.harmony||[]);
  const contrast=new Set(allPairings[id]?.contrast||[]);
  allIng.forEach(ing=>{
    if(ing.id===id)return;
    const p=allPairings[ing.id];if(!p)return;
    if(p.harmony&&p.harmony.includes(id))harmony.add(ing.id);
    if(p.contrast&&p.contrast.includes(id))contrast.add(ing.id);
  });
  return{harmony,contrast};
}

function getCombo(id1,id2,isHarmony){
  const k1=id1+'+'+id2,k2=id2+'+'+id1;
  if(curatedCombos[k1])return{...curatedCombos[k1],auto:false};
  if(curatedCombos[k2])return{...curatedCombos[k2],auto:false};
  const allIng=[...ingredients,...customIngredients];
  const i1=allIng.find(i=>i.id===id1)||[...spirits,...customSpirits].find(s=>s.id===id1);
  const i2=allIng.find(i=>i.id===id2)||[...spirits,...customSpirits].find(s=>s.id===id2);
  const sugMap={fruits:['Rhum Blanc','Gin'],epices:['Rhum Brun','Bourbon'],herbes:['Gin','Vodka'],umami:['Bourbon','Mezcal'],floral:['Gin','Champagne'],boise:['Bourbon','Whisky']};
  const sug=i1?.cat?sugMap[i1.cat]:['Gin','Vodka'];
  if(isHarmony){
    return{goût:`${i1?.profile||i1?.label} rencontre ${i2?.profile||i2?.label}. Accord naturel, même famille aromatique.`,cocktail:`Base : ${sug?.[0]||'Gin'} ou ${sug?.[1]||'Vodka'}. Sirop ${(i1?.label||'').toLowerCase()}-${(i2?.label||'').toLowerCase()}, acide (citron ou lime), garnir selon l'ingrédient dominant.`,auto:true};
  }
  return{goût:`${i1?.profile||i1?.label} contre ${i2?.profile||i2?.label}. Opposition créative — tension gustative.`,cocktail:`Base : ${sug?.[0]||'Gin'}. Ratio 3:1 (${(i1?.label||'').toLowerCase()} dominant), ajuster. Acide souvent nécessaire.`,auto:true};
}

let selectedIngId=null;
function renderIngGrid(filter){
  const grid=document.getElementById('ing-grid');
  grid.innerHTML='';
  const allIng=[...ingredients,...customIngredients];
  let hasSel=selectedIngId!=null;
  let harmony=new Set(),contrast=new Set();
  if(hasSel){const p=getEffectivePairings(selectedIngId);harmony=p.harmony;contrast=p.contrast;}
  catOrder.forEach(cat=>{
    let items=allIng.filter(i=>i.cat===cat);
    if(filter)items=items.filter(i=>i.label.toLowerCase().includes(filter.toLowerCase()));
    if(!items.length)return;
    const hdr=document.createElement('div');hdr.className='cat-header';hdr.textContent=catLabels[cat];grid.appendChild(hdr);
    const g=document.createElement('div');g.className='items-grid';
    items.forEach(ing=>{
      const card=document.createElement('div');
      card.className='item-card'+(ing.custom?' custom-card':'');
      if(ing.id===selectedIngId) card.classList.add('selected');
      else if(hasSel){
        if(harmony.has(ing.id)) card.classList.add('harmony');
        else if(contrast.has(ing.id)) card.classList.add('contrast');
        // else: stays normal — still clickable
      }
      const badge=harmony.has(ing.id)?'<div class="card-badge h">▲ Harmonie</div>':
                  contrast.has(ing.id)?'<div class="card-badge c">↔ Contraste</div>':
                  (hasSel&&ing.id!==selectedIngId)?'<div class="card-badge" style="color:var(--muted)">→ Explorer</div>':'';
      const qcB=ing.qc?'<div class="badge-qc"><svg viewBox="0 0 20 20" fill="#4a9e6f"><path d="M10 1c0 0-2.5 3.5-2.5 5.5c0 1.5 1 2.3 2.5 2.3c1.5 0 2.5-.8 2.5-2.3c0-2-2.5-5.5-2.5-5.5zM5 7.5c-2-1-4 0-4 2c0 1.5 1.5 2 3 1.5c1.5-.5 2-1.5 2.5-1.5c0 0-.5 1.5 0 2.5c.5 1 2 1 2 1L10 16l1.5-3c0 0 1.5 0 2-1c.5-1 0-2.5 0-2.5c.5 0 1 1 2.5 1.5c1.5.5 3 0 3-1.5c0-2-2-3-4-2c-2 1-3 0-3 0c.5-1.5-2.5-5.5-2.5-5.5z"/></svg> Québec</div>':'';
      card.innerHTML=`<div class="card-name">${ing.label}</div><div class="card-profile">${ing.profile}</div>${qcB}${badge}`;
      card.addEventListener('click',()=>onIngClick(ing.id));
      g.appendChild(card);
    });
    grid.appendChild(g);
  });
}

function filterIngredients(val){renderIngGrid(val);}

function onIngClick(id){
  if(selectedIngId===id){selectedIngId=null;document.getElementById('ing-detail').innerHTML='';renderIngGrid(document.getElementById('ing-search').value);return;}
  if(selectedIngId){
    const p=getEffectivePairings(selectedIngId);
    const isH=p.harmony.has(id),isC=p.contrast.has(id);
    // Always open combo — even if no data, API will generate a description
    openCombo(selectedIngId,id,isH,isC);
    return;
  }
  selectedIngId=id;
  const allIng=[...ingredients,...customIngredients];
  const ing=allIng.find(i=>i.id===id);
  renderIngDetail(ing);
  renderIngGrid(document.getElementById('ing-search').value);
  document.getElementById('ing-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

      <div class="detail-title">${ing.label}${ing.custom?' <span style="font-size:.5rem;color:var(--muted);">personnalisé</span>':''}</div>
      <div class="detail-row"><div class="detail-label">Profil</div><div class="detail-text">${ing.profile}</div></div>

let comboContext={id1:null,id2:null};
function addRegenButton(id1,id2,isHarmony,isContrast){
  const existing=document.getElementById('combo-regen-btn');
  if(existing)existing.remove();
  const btn=document.createElement('button');
  btn.id='combo-regen-btn';
  btn.className='back-btn';
  btn.style.cssText='margin-left:.5rem;font-size:.52rem;';
  btn.textContent='↺ Regénérer';
  btn.onclick=()=>{
    const cacheKey='combo_cache_'+[id1,id2].sort().join('__');
    localStorage.removeItem(cacheKey);
    btn.remove();
    openCombo(id1,id2,isHarmony,isContrast);
  };
  const backBtn=document.querySelector('#combo-overlay .back-btn');
  if(backBtn)backBtn.parentNode.insertBefore(btn,backBtn.nextSibling);
}

async function openCombo(id1,id2,isHarmony,isContrast){
  const allIng=[...ingredients,...customIngredients];
  const i1=allIng.find(i=>i.id===id1);
  const i2=allIng.find(i=>i.id===id2);
  comboContext={id1,id2};

  document.getElementById('co-title').textContent=`${i1.label} × ${i2.label}`;
  const typeEl=document.getElementById('co-type');
  if(isHarmony){typeEl.textContent='▲ Accord harmonieux';typeEl.className='detail-type h';}
  else if(isContrast){typeEl.textContent='↔ Accord contrasté';typeEl.className='detail-type c';}
  else{typeEl.textContent='✦ Combo libre — généré par IA';typeEl.className='detail-type s';}

  // Show overlay immediately with loading state
  document.getElementById('co-gout').textContent='Génération en cours...';
  document.getElementById('co-cocktail').textContent='';
  document.getElementById('co-auto').textContent='';
  renderNotesInto('notes-list-combo',id1,id2);
  document.getElementById('combo-overlay').classList.add('open');

  // Check curated first
  const k1=id1+'+'+id2, k2=id2+'+'+id1;
  if(curatedCombos[k1]||curatedCombos[k2]){
    const combo=curatedCombos[k1]||curatedCombos[k2];
    document.getElementById('co-gout').textContent=combo.goût;
    document.getElementById('co-cocktail').textContent=combo.cocktail;
    document.getElementById('co-auto').textContent='';
    addRegenButton(id1,id2,isHarmony,isContrast);
    return;
  }

  // Check cache
  const cacheKey='combo_cache_'+[id1,id2].sort().join('__');
  const cached=localStorage.getItem(cacheKey);
  if(cached){
    try{
      const r=JSON.parse(cached);
      document.getElementById('co-gout').textContent=r.gout||'';
      document.getElementById('co-cocktail').textContent=r.cocktail||'';
      document.getElementById('co-auto').textContent='* Généré par IA — sauvegardé.';
      addRegenButton(id1,id2,isHarmony,isContrast);
      return;
    }catch(e){}
  }

  // Generate via API
  try{
    const prompt=`Expert mixologie et bartender. Décris le combo "${i1.label} + ${i2.label}" pour un cocktail ou sirop maison.
Réponds UNIQUEMENT en JSON valide sans markdown:
{"gout":"3-4 phrases sur le profil de goût, la tension aromatique, ce que ça évoque en bouche","cocktail":"Suggestion concrète: alcool recommandé, technique, garniture, style de verre","alcools":["Alcool1","Alcool2"]}
Alcools parmi: Rhum Blanc, Rhum Brun, Gin, Vodka, Tequila, Mezcal, Bourbon, Cognac, Champagne, Saké, Whisky.
Sois direct et enthousiaste comme un bartender passionné.`;

    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error?.message||'Erreur API');
    const text=data.content[0]?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const result=JSON.parse(clean);
    document.getElementById('co-gout').textContent=result.gout||'';
    document.getElementById('co-cocktail').textContent=result.cocktail||'';
    document.getElementById('co-auto').textContent='* Généré par IA — sauvegardé automatiquement.';
    // Cache the result
    localStorage.setItem(cacheKey,JSON.stringify(result));
    addRegenButton(id1,id2,isHarmony,isContrast);
  }catch(err){
    // Fallback to generic
    const combo=getCombo(id1,id2,isHarmony);
    document.getElementById('co-gout').textContent=combo.goût;
    document.getElementById('co-cocktail').textContent=combo.cocktail;
    document.getElementById('co-auto').textContent='* Description générique — à valider par le test.';
  }
}

function renderMacGrid(){
  const grid=document.getElementById('mac-grid');grid.innerHTML='';
  const allMac=[...macerations,...customMacerations];
  const cats=[...new Set(allMac.map(m=>m.cat))];
  cats.forEach(cat=>{

    const hdr=document.createElement('div');hdr.className='cat-header';hdr.textContent=cat;grid.appendChild(hdr);
    const g=document.createElement('div');g.className='items-grid';
    items.forEach(m=>{
      const card=document.createElement('div');
      card.className='item-card'+(selectedMacId===m.id?' selected':'')+(m.custom?' custom-card':'');

      card.addEventListener('click',()=>selectMac(m.id));

Réponds UNIQUEMENT en JSON valide sans markdown:
{"label":"Nom","cat":"fruits|epices|herbes|umami|floral|boise","profile":"max 8 mots, style: acide, frais...","note":"2-3 phrases bartender direct","harmony":["ing1","ing2","ing3","ing4","ing5"],"contrast":["ing1","ing2","ing3"],"spirits":["Alcool1","Alcool2","Alcool3"]}
Spirits parmi: Rhum Blanc, Rhum Brun, Gin, Vodka, Tequila, Mezcal, Bourbon, Cognac, Champagne, Saké, Whisky.`;
  } else if(addModalType==='spirit'){
    prompt=`Expert mixologie. Fiche pour l'alcool "${name}" (bar cocktail).
Réponds UNIQUEMENT en JSON valide sans markdown:
{"label":"Nom","profile":"max 8 mots caractère","desc":"2-3 phrases sur le caractère et comment l'utiliser en cocktail","compatible":["ingredient1","ingredient2","ingredient3","ingredient4","ingredient5","ingredient6"]}
Compatible = ingrédients courants de bar (fruits, herbes, épices, café, miel...).`;
  } else if(addModalType==='maceration'){
    prompt=`Expert mixologie. Fiche macération pour "${name}". Type: ${techType}.
Réponds UNIQUEMENT en JSON valide sans markdown:
{"name":"Nom","cat":"Catégorie (Fruits/Épices/Herbes/etc)","profile":"profil aromatique complet","spirits":["Alcool1","Alcool2","Alcool3"],"method":"méthode détaillée","time":"temps recommandé"}`;
  } else if(addModalType==='fatwash'){
    prompt=`Expert mixologie. Fiche fat wash pour "${name}".
Réponds UNIQUEMENT en JSON valide sans markdown:
{"name":"Nom","profile":"profil de goût complet","spirits":["Alcool1","Alcool2","Alcool3"],"method":"méthode fat wash détaillée avec temps de congélation"}`;
  }

  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error?.message||'Erreur API');
    const text=data.content[0]?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const result=JSON.parse(clean);
    currentGenResult=result;
    displayPreview(result);

function displayPreview(r){
  document.getElementById('prev-name').textContent=r.label||r.name||'';
  document.getElementById('prev-profile').textContent=r.profile||r.desc||'';
  if(addModalType==='ingredient'){
    document.getElementById('prev-row1').innerHTML=`<span style="color:var(--gold-dim)">Harmonies:</span> <span>${(r.harmony||[]).join(', ')}</span>`;
    document.getElementById('prev-row2').innerHTML=`<span style="color:var(--gold-dim)">Contrastes:</span> <span>${(r.contrast||[]).join(', ')}</span>`;
    document.getElementById('prev-row3').innerHTML=`<span style="color:var(--gold-dim)">Alcools:</span> <span>${(r.spirits||[]).join(', ')}</span>`;
  }else if(addModalType==='spirit'){
    document.getElementById('prev-row1').innerHTML=`<span style="color:var(--gold-dim)">Compatibles:</span> <span>${(r.compatible||[]).join(', ')}</span>`;
    document.getElementById('prev-row2').textContent='';
    document.getElementById('prev-row3').textContent='';
  }else{
    document.getElementById('prev-row1').innerHTML=`<span style="color:var(--gold-dim)">Alcools:</span> <span>${(r.spirits||[]).join(', ')}</span>`;
    document.getElementById('prev-row2').innerHTML=`<span style="color:var(--gold-dim)">Temps:</span> <span>${r.time||'Voir méthode'}</span>`;
    document.getElementById('prev-row3').textContent='';
  }
  document.getElementById('ai-preview').classList.add('show');
  document.getElementById('gen-btn').style.display='none';
  document.getElementById('regen-btn').style.display='inline-block';
  document.getElementById('save-btn').style.display='inline-block';
}

function saveItem(){
  if(!currentGenResult)return;
  const id=(addModalType==='ingredient'?'custom_ing_':'custom_'+addModalType+'_')+Date.now();
  const item={...currentGenResult,id,custom:true};

  if(addModalType==='ingredient'){
    item.pairings={harmony:item.harmony||[],contrast:item.contrast||[]};
    customIngredients.push(item);
    saveCustomData('ingredients',customIngredients);
  }else if(addModalType==='spirit'){
    customSpirits.push(item);
    saveCustomData('spirits',customSpirits);
  }else if(addModalType==='maceration'){
    customMacerations.push(item);
    saveCustomData('macerations',customMacerations);
  }else if(addModalType==='fatwash'){
    customFatWash.push(item);
    saveCustomData('fw',customFatWash);
  }

  document.getElementById('save-confirm').classList.add('show');
  document.getElementById('save-btn').disabled=true;
  const savedType=addModalType;
  setTimeout(()=>{
    closeAddModal();
    document.getElementById('save-btn').disabled=false;
    if(savedType==='ingredient')renderIngGrid(null);
    else if(savedType==='spirit')renderSpiGrid();
    else if(savedType==='maceration')renderMacGrid();
    else if(savedType==='fatwash')renderFWGrid();
  },1200);
}

function showModalError(msg){
  const el=document.getElementById('modal-error');
  el.textContent=msg;el.classList.add('show');
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function notesKey(id1,id2){return id2?'notes_'+[id1,id2].sort().join('__'):'notes_'+id1;}
function loadNotes(id1,id2){try{return JSON.parse(localStorage.getItem(notesKey(id1,id2||null))||'[]');}catch(e){return[];}}
function saveNotes(id1,id2,notes){localStorage.setItem(notesKey(id1,id2||null),JSON.stringify(notes));}

function renderNotesInto(listId,id1,id2){
  const list=document.getElementById(listId);if(!list)return;
  const notes=loadNotes(id1,id2||null);
  if(!notes.length){list.innerHTML='<div class="no-notes">Aucune note — clique + pour ajouter.</div>';return;}
  list.innerHTML='';
  notes.forEach((note,idx)=>{
    const d=document.createElement('div');d.className='note-entry';
    const i2=id2||'';
    d.innerHTML=`<div class="note-date"><input type="date" value="${note.date}" onchange="updateNoteDate('${id1}','${i2}',${idx},this.value)"></div>
    <textarea class="note-text" rows="2" onchange="updateNoteText('${id1}','${i2}',${idx},this.value)">${note.text}</textarea>
    <button class="note-delete" onclick="deleteNote('${id1}','${i2}',${idx},'${listId}')">✕</button>`;
    list.appendChild(d);
  });
}

function addNoteFor(ctx){
  let id1,id2,listId;
  if(ctx==='ing'){id1=selectedIngId;id2=null;listId='notes-list-ing';}
  else if(ctx==='spirit'){id1=selectedSpiId;id2=null;listId='notes-list-spirit';}
  else if(ctx==='combo'){id1=comboContext.id1;id2=comboContext.id2;listId='notes-list-combo';}
  else if(ctx==='mac'){id1=selectedMacId;id2=null;listId='notes-list-mac';}
  else if(ctx==='fw'){id1=selectedFWId;id2=null;listId='notes-list-fw';}
  else if(ctx==='cocktail'){id1=selectedCocktailId;id2=null;listId='notes-list-cocktail';}
  if(!id1)return;
  const notes=loadNotes(id1,id2||null);
  notes.unshift({date:todayStr(),text:''});
  saveNotes(id1,id2||null,notes);
  renderNotesInto(listId,id1,id2||null);
  setTimeout(()=>{const f=document.querySelector('#'+listId+' .note-text');if(f)f.focus();},80);
}
function updateNoteDate(id1,id2,idx,val){const n=loadNotes(id1,id2||null);if(n[idx])n[idx].date=val;saveNotes(id1,id2||null,n);}
function updateNoteText(id1,id2,idx,val){const n=loadNotes(id1,id2||null);if(n[idx])n[idx].text=val;saveNotes(id1,id2||null,n);}
function deleteNote(id1,id2,idx,listId){const n=loadNotes(id1,id2||null);n.splice(idx,1);saveNotes(id1,id2||null,n);renderNotesInto(listId,id1,id2||null);}

let currentCocktail=null;
let savedCocktails=[];
let selectedCocktailId=null;

function loadSavedCocktails(){
  try{savedCocktails=JSON.parse(localStorage.getItem('saved_cocktails')||'[]');}catch(e){savedCocktails=[];}
}

function showSavedCocktails(){
  const list=document.getElementById('saved-cocktails-list');
  const grid=document.getElementById('saved-cocktails-grid');
  const isVisible=list.style.display!=='none';
  if(isVisible){list.style.display='none';return;}
  list.style.display='block';
  grid.innerHTML='';
  if(!savedCocktails.length){
    grid.innerHTML='<div style="font-size:.65rem;color:var(--muted);font-style:italic;padding:.5rem 0;">Aucun cocktail sauvegardé.</div>';
    return;
  }
  const g=document.createElement('div');g.className='items-grid';
  savedCocktails.forEach((c,idx)=>{
    const card=document.createElement('div');card.className='item-card';
    card.innerHTML=`<div class="card-name">${c.name}</div><div class="card-profile">${c.style}</div>`;
    card.addEventListener('click',()=>showCocktailDetail(c,idx));
    g.appendChild(card);
  });
  grid.appendChild(g);
}

async function searchCocktail(){
  const query=document.getElementById('cocktail-search').value.trim().toLowerCase();
  if(!query)return;
  document.getElementById('saved-cocktails-list').style.display='none';
  const result=document.getElementById('cocktail-result');
  result.innerHTML='<div class="searching-msg">Recherche en cours...</div>';

  // Check local database first
  const localKey=Object.keys(classicCocktails).find(k=>
    k===query||k.includes(query)||query.includes(k)
  );
  if(localKey){
    const cocktail=classicCocktails[localKey];
    currentCocktail=cocktail;
    renderCocktailCard(cocktail,result);
    return;
  }

  // Check saved cocktails
  const saved=savedCocktails.find(c=>c.name.toLowerCase().includes(query));
  if(saved){currentCocktail=saved;renderCocktailCard(saved,result);return;}

  // Generate via API
  try{
    const prompt=`Expert bartender. Fiche complète pour le cocktail "${query}".
Réponds UNIQUEMENT en JSON valide sans markdown:
{"name":"Nom officiel","style":"Style (ex: Sour, Highball, Tiki, Stirred...)","gout":"3-4 phrases sur le profil de goût, ce que ça évoque, la texture, la longueur en bouche","verre":"Type de verre recommandé","ingredients":[{"qty":"quantité en oz","name":"ingrédient"}],"methode":["étape 1","étape 2","étape 3","étape 4"],"note":"Note bartender — astuce, variante, histoire courte"}
Quantités en oz. Sois précis et passionné.`;

    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})
    });
    const data=await response.json();
    if(!response.ok)throw new Error(data.error?.message||'Erreur API');
    const text=data.content[0]?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const cocktail=JSON.parse(clean);
    currentCocktail=cocktail;
    renderCocktailCard(cocktail,result);
  }catch(err){
    result.innerHTML=`<div class="searching-msg">Cocktail non trouvé. Vérifie l'orthographe ou essaie en anglais.</div>`;
  }
}

function renderCocktailCard(cocktail,container){
  const ings=(cocktail.ingredients||[]).map(i=>`<li><span>${i.name}</span><span class="cocktail-qty">${i.qty}</span></li>`).join('');
  const steps=(cocktail.methode||[]).map(s=>`<div class="cocktail-step">${s}</div>`).join('');
  container.innerHTML=`
    <div class="detail-panel" style="cursor:pointer;" onclick="openCocktailOverlay()">
      <div class="detail-title">${cocktail.name}</div>
      <div style="font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;">${cocktail.style} — ${cocktail.verre}</div>
      <div class="detail-row"><div class="detail-label">Profil de goût</div><div class="detail-text">${cocktail.gout}</div></div>
      <div class="detail-row"><div class="detail-label">Ingrédients</div><ul class="cocktail-ing-list">${ings}</ul></div>
      <div style="font-size:.6rem;color:var(--gold-dim);margin-top:.5rem;text-align:center;">Appuyer pour voir la méthode complète →</div>
    </div>`;
}

function openCocktailOverlay(){
  if(!currentCocktail)return;
  const c=currentCocktail;
  const ings=(c.ingredients||[]).map(i=>`<li><span>${i.name}</span><span class="cocktail-qty">${i.qty}</span></li>`).join('');
  const steps=(c.methode||[]).map(s=>`<div class="cocktail-step">${s}</div>`).join('');
  document.getElementById('cocktail-detail-content').innerHTML=`
    <div class="detail-title">${c.name}</div>
    <div style="font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;">${c.style} — ${c.verre}</div>
    <div class="detail-row"><div class="detail-label">Profil de goût</div><div class="detail-text">${c.gout}</div></div>
    <div class="detail-row"><div class="detail-label">Ingrédients</div><ul class="cocktail-ing-list">${ings}</ul></div>
    <div class="detail-row"><div class="detail-label">Méthode</div><div style="counter-reset:cstep;">${steps}</div></div>
    ${c.note?`<div class="detail-row"><div class="detail-label">Note bartender</div><div class="detail-text" style="font-size:.65rem;font-style:italic;opacity:.8;">${c.note}</div></div>`:''}`;
  selectedCocktailId='cocktail_'+c.name.replace(/\s+/g,'_').toLowerCase();
  renderNotesInto('notes-list-cocktail',selectedCocktailId,null);
  document.getElementById('cocktail-overlay').classList.add('open');
}

function closeCocktailOverlay(){
  document.getElementById('cocktail-overlay').classList.remove('open');
}

function saveCurrentCocktail(){
  if(!currentCocktail)return;
  const existing=savedCocktails.findIndex(c=>c.name===currentCocktail.name);
  if(existing>=0){
    const btn=document.getElementById('save-cocktail-btn');
    btn.textContent='Déjà sauvegardé';setTimeout(()=>{btn.textContent='★ Sauvegarder';},1500);
    return;
  }
  savedCocktails.push(currentCocktail);
  localStorage.setItem('saved_cocktails',JSON.stringify(savedCocktails));
  const btn=document.getElementById('save-cocktail-btn');
  btn.textContent='✓ Sauvegardé!';btn.style.background='#7eb88a';
  setTimeout(()=>{btn.textContent='★ Sauvegarder';btn.style.background='';},1500);
}

function showCocktailDetail(cocktail,idx){
  currentCocktail=cocktail;
  openCocktailOverlay();
}

// Allow Enter in cocktail search
document.getElementById('cocktail-search').addEventListener('keydown',e=>{if(e.key==='Enter')searchCocktail();});

// ── INIT ──────────────────────────────────────────────────────────────────────
loadCustomData();
loadSavedCocktails();
quebecIngredients.forEach(qi=>{if(!ingredients.find(i=>i.id===qi.id))ingredients.push(qi);});
quebecSpirits.forEach(qs=>{if(!spirits.find(s=>s.id===qs.id))spirits.push(qs);});
Object.assign(pairings,quebecPairings);
renderIngGrid(null);
</script>
