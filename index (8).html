<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Roue — Bar Mobile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap');
:root{--bg:#0e0d0b;--surface:#1a1814;--gold:#c9a84c;--gold-dim:#7a6230;--cream:#f0e8d5;--muted:#4a4540;--text:#d4c9b0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:1.5rem 1rem 3rem;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.07) 0%,transparent 60%);pointer-events:none;}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,5vw,2rem);color:var(--gold);letter-spacing:.08em;text-align:center;margin-bottom:.2rem;}
.subtitle{font-size:.58rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:1.5rem;text-align:center;}

/* NAV TABS */
.nav-tabs{display:flex;border:1px solid var(--gold-dim);border-radius:3px;margin-bottom:1.5rem;overflow:hidden;max-width:500px;margin-left:auto;margin-right:auto;}
.nav-tab{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:9px 6px;cursor:pointer;transition:all .2s;text-align:center;}
.nav-tab.active{background:var(--gold-dim);color:var(--cream);}
.nav-tab:hover:not(.active){color:var(--gold);}

/* SECTION */
.section{display:none;max-width:700px;margin:0 auto;}
.section.active{display:block;}

/* SEARCH */
.search-box{width:100%;background:var(--surface);border:1px solid #2a2520;color:var(--text);font-family:'DM Mono',monospace;font-size:.7rem;padding:.6rem .9rem;border-radius:3px;outline:none;margin-bottom:1rem;}
.search-box:focus{border-color:var(--gold-dim);}

/* CATEGORY HEADER */
.cat-header{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin:1.2rem 0 .5rem;padding-bottom:.3rem;border-bottom:1px solid #2a2520;}

/* GRID */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem;margin-bottom:.5rem;}
@media(max-width:400px){.items-grid{grid-template-columns:repeat(2,1fr);}}

/* ITEM CARD */
.item-card{background:var(--surface);border:1px solid #2a2520;border-radius:3px;padding:.7rem .8rem;cursor:pointer;transition:all .15s;user-select:none;}
.item-card:active{transform:scale(.97);}
.item-card.selected{border-color:var(--gold);background:rgba(201,168,76,.1);}
.item-card.harmony{border-color:#7eb88a;background:rgba(126,184,138,.08);}
.item-card.contrast{border-color:#c97a4c;background:rgba(201,122,76,.08);}
.item-card.dimmed{opacity:.25;}
.item-card.spirit-compat{border-color:var(--gold-dim);background:rgba(201,168,76,.06);}
.card-name{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--gold);font-style:italic;margin-bottom:.15rem;}
.card-profile{font-size:.55rem;color:var(--muted);line-height:1.4;}
.card-badge{font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;margin-top:.2rem;}
.card-badge.h{color:#7eb88a;}.card-badge.c{color:#c97a4c;}

/* DETAIL PANEL */
.detail-panel{background:var(--surface);border:1px solid var(--gold-dim);border-radius:3px;padding:1.2rem 1.3rem;margin-bottom:1.2rem;}
.detail-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);font-style:italic;margin-bottom:.6rem;}
.detail-type{font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.8rem;}
.detail-type.h{color:#7eb88a;}.detail-type.c{color:#c97a4c;}.detail-type.s{color:var(--gold);}
.detail-row{margin-bottom:.7rem;}
.detail-label{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem;}
.detail-text{font-size:.7rem;color:var(--text);line-height:1.75;opacity:.9;}
.detail-note{font-size:.55rem;color:var(--muted);font-style:italic;margin-top:.4rem;}
.pills{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.25rem;}
.pill{font-size:.6rem;padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .15s;}
.pill:active{transform:scale(.95);}
.pill.h{background:rgba(126,184,138,.12);border:1px solid rgba(126,184,138,.35);color:#7eb88a;}
.pill.c{background:rgba(201,122,76,.12);border:1px solid rgba(201,122,76,.35);color:#c97a4c;}
.pill.s{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--gold);}
.pill.neutral{background:rgba(201,168,76,.08);border:1px solid #2a2520;color:var(--text);}
.back-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;padding:5px 14px;cursor:pointer;transition:all .2s;border-radius:2px;margin-top:.8rem;}
.back-btn:active{background:var(--gold-dim);color:var(--cream);}

/* NOTES */
.notes-section{margin-top:1rem;border-top:1px solid #2a2520;padding-top:.8rem;}
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.notes-title{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);}
.add-note-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:.6rem;padding:3px 10px;cursor:pointer;transition:all .15s;border-radius:2px;}
.add-note-btn:active{background:var(--gold-dim);color:var(--cream);}
.note-entry{background:rgba(201,168,76,.04);border-left:2px solid var(--gold-dim);padding:.5rem .7rem;margin-bottom:.4rem;border-radius:0 2px 2px 0;position:relative;}
.note-date input[type=date]{background:transparent;border:none;border-bottom:1px solid var(--muted);color:var(--muted);font-family:'DM Mono',monospace;font-size:.52rem;padding:0 2px;outline:none;margin-bottom:.3rem;}
.note-text{font-size:.65rem;color:var(--text);line-height:1.6;width:100%;background:transparent;border:none;resize:none;font-family:'DM Mono',monospace;outline:none;min-height:40px;}
.note-delete{position:absolute;top:.4rem;right:.5rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.7rem;opacity:.5;}
.no-notes{font-size:.6rem;color:var(--muted);font-style:italic;opacity:.6;}

/* TECHNIQUES */
.tech-tabs{display:flex;border:1px solid #2a2520;border-radius:3px;margin-bottom:1rem;overflow:hidden;}
.tech-tab{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:8px;cursor:pointer;transition:all .2s;text-align:center;}
.tech-tab.active{background:var(--gold-dim);color:var(--cream);}
.fw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.fw-add-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:.58rem;padding:5px 12px;cursor:pointer;border-radius:2px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--gold-dim);border-radius:3px;padding:1.5rem;width:100%;max-width:400px;}
.modal-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.05rem;margin-bottom:1rem;font-style:italic;}
.modal-field{margin-bottom:.8rem;}
.modal-field label{font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.3rem;}
.modal-field input,.modal-field textarea{width:100%;background:rgba(201,168,76,.05);border:1px solid #2a2520;color:var(--text);font-family:'DM Mono',monospace;font-size:.68rem;padding:.4rem .6rem;border-radius:2px;outline:none;}
.modal-field textarea{resize:vertical;min-height:55px;}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem;}
.modal-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:.58rem;padding:6px 14px;cursor:pointer;border-radius:2px;}
.modal-btn.primary{background:var(--gold-dim);color:var(--cream);}
</style>
</head>
<body>
<h1>Le Roue</h1>
<p class="subtitle">Cocktails & Sirops — Mariages aromatiques</p>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="setTab('ingredients')">Ingrédients</button>
  <button class="nav-tab" onclick="setTab('spirits')">Alcools</button>
  <button class="nav-tab" onclick="setTab('techniques')">Techniques</button>
</div>

<!-- INGREDIENTS -->
<div class="section active" id="tab-ingredients">
  <input class="search-box" type="text" placeholder="Rechercher un ingrédient..." oninput="filterIngredients(this.value)" id="ing-search">
  <div id="ing-detail"></div>
  <div id="ing-grid"></div>
</div>

<!-- SPIRITS -->
<div class="section" id="tab-spirits">
  <div id="spi-detail"></div>
  <div id="spi-grid"></div>
</div>

<!-- TECHNIQUES -->
<div class="section" id="tab-techniques">
  <div class="tech-tabs">
    <button class="tech-tab active" id="tt-mac" onclick="setTechTab('maceration')">Macération</button>
    <button class="tech-tab" id="tt-fw" onclick="setTechTab('fatwash')">Fat Wash</button>
  </div>
  <div id="tech-mac">
    <div id="mac-detail"></div>
    <div id="mac-grid"></div>
  </div>
  <div id="tech-fw" style="display:none;">
    <div class="fw-header">
      <span style="font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;">Méthode congélateur</span>
      <button class="fw-add-btn" onclick="openAddFW()">+ Ajouter</button>
    </div>
    <div id="fw-detail"></div>
    <div id="fw-grid"></div>
  </div>
</div>

<!-- COMBO DETAIL OVERLAY (full screen on mobile) -->
<div class="modal-overlay" id="combo-overlay">
  <div class="modal-box" style="max-width:500px;max-height:90vh;overflow-y:auto;">
    <div class="detail-title" id="co-title"></div>
    <div class="detail-type" id="co-type"></div>
    <div class="detail-row"><div class="detail-label">Profil de goût</div><div class="detail-text" id="co-gout"></div></div>
    <div class="detail-row"><div class="detail-label">Suggestion cocktail</div><div class="detail-text" id="co-cocktail"></div></div>
    <div class="detail-note" id="co-auto"></div>
    <div class="notes-section">
      <div class="notes-header"><span class="notes-title">📋 Mes notes</span><button class="add-note-btn" onclick="addNoteFor('combo')">+ Note</button></div>
      <div id="notes-list-combo"></div>
    </div>
    <button class="back-btn" onclick="closeCombo()">← Retour</button>
  </div>
</div>

<!-- ADD FAT WASH MODAL -->
<div class="modal-overlay" id="fw-modal">
  <div class="modal-box">
    <div class="modal-title">Ajouter un fat wash</div>
    <div class="modal-field"><label>Nom</label><input type="text" id="fw-new-name" placeholder="Ex: Beurre de peanut"></div>
    <div class="modal-field"><label>Profil de goût</label><textarea id="fw-new-profile" placeholder="Ex: Noisette, gras, légèrement sucré..."></textarea></div>
    <div class="modal-field"><label>Alcools (séparés par virgule)</label><input type="text" id="fw-new-spirits" placeholder="Ex: Bourbon, Vodka"></div>
    <div class="modal-field"><label>Méthode (optionnel)</label><textarea id="fw-new-method" placeholder="Ex: 2 c. à soupe par 200ml..."></textarea></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeAddFW()">Annuler</button>
      <button class="modal-btn primary" onclick="saveCustomFW()">Ajouter</button>
    </div>
  </div>
</div>

  citron:{harmony:['pamplemousse','orange','menthe','gingembre','verveine','thym','lavande'],contrast:['vanille','miel','basilic','cafe','soya'],note:"Le citron relève tout ce qu'il touche. En contraste avec la vanille ou le miel — cette tension doux-acide qui fait saliver avant même de boire."},

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{
    b.classList.toggle('active',['ingredients','spirits','techniques'][i]===tab);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='ingredients') renderIngGrid(null);
  if(tab==='spirits') renderSpiGrid();
  if(tab==='techniques'){loadCustomFW();renderMacGrid();if(currentTechTab==='fatwash')renderFWGrid();}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().split('T')[0];}

function getEffectivePairings(id){
  const harmony=new Set(pairings[id]?.harmony||[]);
  const contrast=new Set(pairings[id]?.contrast||[]);
  ingredients.forEach(ing=>{
    if(ing.id===id)return;
    const p=pairings[ing.id];if(!p)return;
    if(p.harmony.includes(id))harmony.add(ing.id);
    if(p.contrast.includes(id))contrast.add(ing.id);
  });
  return{harmony,contrast};
}

function getCombo(id1,id2,isHarmony){
  const k1=id1+'+'+id2,k2=id2+'+'+id1;
  if(curatedCombos[k1])return{...curatedCombos[k1],auto:false};
  if(curatedCombos[k2])return{...curatedCombos[k2],auto:false};
  const i1=ingredients.find(i=>i.id===id1)||spirits.find(s=>s.id===id1);
  const i2=ingredients.find(i=>i.id===id2)||spirits.find(s=>s.id===id2);
  const spiritSuggestions={fruits:['Rhum Blanc','Gin'],epices:['Rhum Brun','Bourbon'],herbes:['Gin','Vodka'],umami:['Bourbon','Mezcal'],floral:['Gin','Champagne'],boise:['Bourbon','Whisky']};
  const sug=i1?.cat?spiritSuggestions[i1.cat]:['Gin','Vodka'];
  if(isHarmony){
    return{goût:`${i1?.profile||i1?.label} rencontre ${i2?.profile||i2?.label}. Accord naturel, même famille aromatique — le résultat est fluide et cohérent.`,cocktail:`Base recommandée : ${sug?.[0]||'Gin'} ou ${sug?.[1]||'Vodka'}. Sirop ${(i1?.label||'').toLowerCase()}-${(i2?.label||'').toLowerCase()}, acide (citron ou lime), garnir selon l'ingrédient dominant.`,auto:true};
  } else {
    return{goût:`${i1?.profile||i1?.label} contre ${i2?.profile||i2?.label}. Opposition créative — tension gustative qui demande de l'équilibre dans les proportions.`,cocktail:`Base recommandée : ${sug?.[0]||'Gin'}. Commencer ratio 3:1 (${(i1?.label||'').toLowerCase()} dominant), ajuster. L'acide est souvent nécessaire pour lier.`,auto:true};
  }
}

// ── INGREDIENTS GRID ──────────────────────────────────────────────────────────
function renderIngGrid(filter){
  const grid=document.getElementById('ing-grid');
  grid.innerHTML='';
  let hasPairings=selectedIngId!=null;
  let harmony=new Set(),contrast=new Set();
  if(hasPairings){const p=getEffectivePairings(selectedIngId);harmony=p.harmony;contrast=p.contrast;}

  catOrder.forEach(cat=>{
    let items=ingredients.filter(i=>i.cat===cat);
    if(filter) items=items.filter(i=>i.label.toLowerCase().includes(filter.toLowerCase()));
    if(!items.length)return;
    const hdr=document.createElement('div');
    hdr.className='cat-header';hdr.textContent=catLabels[cat];
    grid.appendChild(hdr);
    const g=document.createElement('div');g.className='items-grid';
    items.forEach(ing=>{
      const card=document.createElement('div');
      card.className='item-card';
      if(ing.id===selectedIngId) card.classList.add('selected');
      else if(hasPairings){
        if(harmony.has(ing.id)) card.classList.add('harmony');
        else if(contrast.has(ing.id)) card.classList.add('contrast');
        else card.classList.add('dimmed');
      }
      const badge=harmony.has(ing.id)?'<div class="card-badge h">▲ Harmonie</div>':
                  contrast.has(ing.id)?'<div class="card-badge c">↔ Contraste</div>':'';
      card.innerHTML=`<div class="card-name">${ing.label}</div><div class="card-profile">${ing.profile}</div>${badge}`;
      card.addEventListener('click',()=>onIngClick(ing.id));
      g.appendChild(card);
    });
    grid.appendChild(g);
  });
}

function filterIngredients(val){renderIngGrid(val);}

function onIngClick(id){
  if(selectedIngId===id){
    // Deselect
    selectedIngId=null;
    document.getElementById('ing-detail').innerHTML='';
    renderIngGrid(document.getElementById('ing-search').value);
    return;
  }
  // If another ingredient already selected — show combo
  if(selectedIngId){
    const p=getEffectivePairings(selectedIngId);
    const isH=p.harmony.has(id),isC=p.contrast.has(id);
    if(isH||isC){
      openCombo(selectedIngId,id,isH);
      return;
    }
  }
  // Select this ingredient
  selectedIngId=id;
  const ing=ingredients.find(i=>i.id===id);
  renderIngDetail(ing);
  renderIngGrid(document.getElementById('ing-search').value);
  document.getElementById('ing-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderIngDetail(ing){
  const p=getEffectivePairings(ing.id);
  const hPills=[...p.harmony].map(hid=>{
    const h=ingredients.find(i=>i.id===hid);
    return h?`<span class="pill h" onclick="openCombo('${ing.id}','${hid}',true)">${h.label} →</span>`:'';
  }).join('');
  const cPills=[...p.contrast].map(cid=>{
    const c=ingredients.find(i=>i.id===cid);
    return c?`<span class="pill c" onclick="openCombo('${ing.id}','${cid}',false)">${c.label} →</span>`:'';
  }).join('');
  const note=pairings[ing.id]?.note||'';
  document.getElementById('ing-detail').innerHTML=`
    <div class="detail-panel">
      <div class="detail-title">${ing.label}</div>
      <div class="detail-row"><div class="detail-label">Profil</div><div class="detail-text">${ing.profile}</div></div>
      <div class="detail-row"><div class="detail-label">▲ Harmonie</div><div class="pills">${hPills}</div></div>
      <div class="detail-row"><div class="detail-label">↔ Contraste</div><div class="pills">${cPills}</div></div>
      ${note?`<div class="detail-row"><div class="detail-label">Note</div><div class="detail-text" style="font-size:.65rem;opacity:.75;">${note}</div></div>`:''}
      <div class="notes-section">
        <div class="notes-header"><span class="notes-title">📋 Mes notes</span><button class="add-note-btn" onclick="addNoteFor('ing')">+ Note</button></div>
        <div id="notes-list-ing"></div>
      </div>
      <button class="back-btn" onclick="deselectIng()">← Retour</button>
    </div>`;
  renderNotesInto('notes-list-ing',ing.id,null);
}

function deselectIng(){
  selectedIngId=null;
  document.getElementById('ing-detail').innerHTML='';
  renderIngGrid(document.getElementById('ing-search').value);
}

// ── SPIRITS GRID ──────────────────────────────────────────────────────────────
function renderSpiGrid(){
  const grid=document.getElementById('spi-grid');
  grid.innerHTML='';
  const g=document.createElement('div');g.className='items-grid';
  spirits.forEach(spirit=>{
    const card=document.createElement('div');
    card.className='item-card'+(spirit.id===selectedSpiId?' selected':'');
    card.innerHTML=`<div class="card-name">${spirit.label}</div><div class="card-profile">${spirit.desc.split('.')[0]}</div>`;
    card.addEventListener('click',()=>onSpiClick(spirit.id));
    g.appendChild(card);
  });
  grid.appendChild(g);
}

function onSpiClick(id){
  if(selectedSpiId===id){
    selectedSpiId=null;
    document.getElementById('spi-detail').innerHTML='';
    renderSpiGrid();return;
  }
  selectedSpiId=id;
  const spirit=spirits.find(s=>s.id===id);
  renderSpiDetail(spirit);
  renderSpiGrid();
  document.getElementById('spi-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

  document.getElementById('spi-detail').innerHTML=`

      <div class="detail-title">${spirit.label}</div>
      <div class="detail-row"><div class="detail-label">Caractère</div><div class="detail-text">${spirit.desc}</div></div>

        <div id="notes-list-spirit"></div>
      </div>
      <button class="back-btn" onclick="deselectSpi()">← Retour</button>
    </div>`;
  renderNotesInto('notes-list-spirit',spirit.id,null);
}

function openSpiCombo(spiritId,ingId){
  const spirit=spirits.find(s=>s.id===spiritId);
  const ing=ingredients.find(i=>i.id===ingId);
  comboContext={id1:spiritId,id2:ingId};
  document.getElementById('co-title').textContent=`${spirit.label} × ${ing.label}`;
  document.getElementById('co-type').textContent='🍾 Accord alcool — ingrédient compatible';
  document.getElementById('co-type').className='detail-type s';
  document.getElementById('co-gout').textContent=`${ing.profile}. Sur base ${spirit.label.toLowerCase()} — ${spirit.desc.split('.')[0].toLowerCase()}.`;
  document.getElementById('co-cocktail').textContent=`Sirop ${ing.label.toLowerCase()} dans ${spirit.label}. Acide si fruité, garnir selon l'ingrédient dominant. Note tes essais ci-dessous.`;
  document.getElementById('co-auto').textContent='* Suggestion générique — documente tes propres tests.';
  renderNotesInto('notes-list-combo',spiritId,ingId);
  document.getElementById('combo-overlay').classList.add('open');
}

// ── COMBO OVERLAY ─────────────────────────────────────────────────────────────
function openCombo(id1,id2,isHarmony){
  const i1=ingredients.find(i=>i.id===id1);
  const i2=ingredients.find(i=>i.id===id2);
  comboContext={id1,id2};
  const combo=getCombo(id1,id2,isHarmony);
  document.getElementById('co-title').textContent=`${i1.label} × ${i2.label}`;
  const typeEl=document.getElementById('co-type');
  typeEl.textContent=isHarmony?'▲ Accord harmonieux':'↔ Accord contrasté';
  typeEl.className='detail-type '+(isHarmony?'h':'c');
  document.getElementById('co-gout').textContent=combo.goût;
  document.getElementById('co-cocktail').textContent=combo.cocktail;
  document.getElementById('co-auto').textContent=combo.auto?'* Description générée — à valider par le test.':'';
  renderNotesInto('notes-list-combo',id1,id2);
  document.getElementById('combo-overlay').classList.add('open');
}

function closeCombo(){
  document.getElementById('combo-overlay').classList.remove('open');
}

// ── TECHNIQUES ────────────────────────────────────────────────────────────────
let currentTechTab='maceration';

function setTechTab(tab){
  currentTechTab=tab;
  document.getElementById('tt-mac').classList.toggle('active',tab==='maceration');
  document.getElementById('tt-fw').classList.toggle('active',tab==='fatwash');
  document.getElementById('tech-mac').style.display=tab==='maceration'?'block':'none';
  document.getElementById('tech-fw').style.display=tab==='fatwash'?'block':'none';
  if(tab==='fatwash')renderFWGrid();
}

function renderMacGrid(){
  const grid=document.getElementById('mac-grid');
  grid.innerHTML='';
  const cats=[...new Set(macerations.map(m=>m.cat))];
  cats.forEach(cat=>{
    const items=macerations.filter(m=>m.cat===cat);
    const hdr=document.createElement('div');hdr.className='cat-header';hdr.textContent=cat;
    grid.appendChild(hdr);
    const g=document.createElement('div');g.className='items-grid';
    items.forEach(m=>{
      const card=document.createElement('div');
      card.className='item-card'+(selectedMacId===m.id?' selected':'');
      card.innerHTML=`<div class="card-name">${m.name}</div><div class="card-profile">${m.profile.split(',')[0]}</div>`;
      card.addEventListener('click',()=>selectMac(m.id));
      g.appendChild(card);
    });
    grid.appendChild(g);
  });
}

function selectMac(id){
  selectedMacId=id;
  const m=macerations.find(x=>x.id===id);
  const sPills=m.spirits.map(s=>`<span class="pill neutral" style="cursor:default">${s}</span>`).join('');
  document.getElementById('mac-detail').innerHTML=`
    <div class="detail-panel">
      <div class="detail-title">${m.name}</div>
      <div class="detail-row"><div class="detail-label">Profil aromatique</div><div class="detail-text">${m.profile}</div></div>
      <div class="detail-row"><div class="detail-label">Alcools recommandés</div><div class="pills">${sPills}</div></div>
      <div class="detail-row"><div class="detail-label">Méthode</div><div class="detail-text">${m.method}</div></div>
      <div class="detail-row"><div class="detail-label">Temps d'infusion</div><div class="detail-text">${m.time}</div></div>
      <div class="notes-section">
        <div class="notes-header"><span class="notes-title">📋 Mes notes</span><button class="add-note-btn" onclick="addNoteFor('mac')">+ Note</button></div>
        <div id="notes-list-mac"></div>
      </div>
      <button class="back-btn" onclick="closeMac()">← Retour</button>
    </div>`;
  renderNotesInto('notes-list-mac',id,null);
  document.getElementById('mac-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
  renderMacGrid();
}

function closeMac(){
  selectedMacId=null;
  document.getElementById('mac-detail').innerHTML='';
  renderMacGrid();
}

function renderFWGrid(){
  const grid=document.getElementById('fw-grid');
  grid.innerHTML='';
  const all=[...fatWashBase,...customFatWash];
  const g=document.createElement('div');g.className='items-grid';
  all.forEach(fw=>{
    const card=document.createElement('div');
    card.className='item-card'+(selectedFWId===fw.id?' selected':'')+(fw.custom?' ':'');
    card.style.borderStyle=fw.custom?'dashed':'solid';
    card.innerHTML=`<div class="card-name">${fw.name}</div><div class="card-profile">${fw.spirits.slice(0,2).join(', ')}</div>`;
    card.addEventListener('click',()=>selectFW(fw.id));
    g.appendChild(card);
  });
  grid.appendChild(g);
}

function selectFW(id){
  selectedFWId=id;
  const all=[...fatWashBase,...customFatWash];
  const fw=all.find(x=>x.id===id);
  const sPills=fw.spirits.map(s=>`<span class="pill neutral" style="cursor:default">${s}</span>`).join('');
  document.getElementById('fw-detail').innerHTML=`
    <div class="detail-panel">
      <div class="detail-title">${fw.name}</div>
      <div class="detail-row"><div class="detail-label">Profil de goût</div><div class="detail-text">${fw.profile}</div></div>
      <div class="detail-row"><div class="detail-label">Alcools recommandés</div><div class="pills">${sPills}</div></div>
      <div class="detail-row"><div class="detail-label">Méthode</div><div class="detail-text">${fw.method}</div></div>
      <div class="notes-section">
        <div class="notes-header"><span class="notes-title">📋 Mes notes</span><button class="add-note-btn" onclick="addNoteFor('fw')">+ Note</button></div>
        <div id="notes-list-fw"></div>
      </div>
      <button class="back-btn" onclick="closeFW()">← Retour</button>
    </div>`;
  renderNotesInto('notes-list-fw',id,null);
  document.getElementById('fw-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
  renderFWGrid();
}

function closeFW(){
  selectedFWId=null;
  document.getElementById('fw-detail').innerHTML='';
  renderFWGrid();
}

function loadCustomFW(){
  try{customFatWash=JSON.parse(localStorage.getItem('custom_fw')||'[]');}catch(e){customFatWash=[];}
}
function saveCustomFWList(){localStorage.setItem('custom_fw',JSON.stringify(customFatWash));}
function openAddFW(){document.getElementById('fw-modal').classList.add('open');}
function closeAddFW(){
  document.getElementById('fw-modal').classList.remove('open');
  ['fw-new-name','fw-new-profile','fw-new-spirits','fw-new-method'].forEach(id=>document.getElementById(id).value='');
}
function saveCustomFW(){
  const name=document.getElementById('fw-new-name').value.trim();
  if(!name)return;
  const profile=document.getElementById('fw-new-profile').value.trim()||'Profil à documenter.';
  const raw=document.getElementById('fw-new-spirits').value.trim();
  const spirits_list=raw?raw.split(',').map(s=>s.trim()).filter(Boolean):['À définir'];
  const method=document.getElementById('fw-new-method').value.trim()||'Même méthode congélateur standard.';
  customFatWash.push({id:'fw_custom_'+Date.now(),name,profile,spirits:spirits_list,method,custom:true});
  saveCustomFWList();closeAddFW();renderFWGrid();
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function notesKey(id1,id2){
  if(!id2)return'notes_'+id1;
  return'notes_'+[id1,id2].sort().join('__');
}
function loadNotes(id1,id2){
  try{return JSON.parse(localStorage.getItem(notesKey(id1,id2))||'[]');}catch(e){return[];}
}
function saveNotes(id1,id2,notes){localStorage.setItem(notesKey(id1,id2),JSON.stringify(notes));}

function renderNotesInto(listId,id1,id2){
  const list=document.getElementById(listId);if(!list)return;
  const notes=loadNotes(id1,id2||null);
  if(!notes.length){list.innerHTML='<div class="no-notes">Aucune note — clique + pour ajouter.</div>';return;}
  list.innerHTML='';
  notes.forEach((note,idx)=>{
    const d=document.createElement('div');d.className='note-entry';
    const i2=id2||'';
    d.innerHTML=`<div class="note-date"><input type="date" value="${note.date}" onchange="updateNoteDate('${id1}','${i2}',${idx},this.value)"></div>
    <textarea class="note-text" rows="2" placeholder="Fat wash 48h, ratio..." onchange="updateNoteText('${id1}','${i2}',${idx},this.value)">${note.text}</textarea>
    <button class="note-delete" onclick="deleteNote('${id1}','${i2}',${idx},'${listId}')">✕</button>`;
    list.appendChild(d);
  });
}

function addNoteFor(ctx){
  let id1,id2,listId;
  if(ctx==='ing'){id1=selectedIngId;id2=null;listId='notes-list-ing';}
  else if(ctx==='spirit'){id1=selectedSpiId;id2=null;listId='notes-list-spirit';}
  else if(ctx==='combo'){id1=comboContext.id1;id2=comboContext.id2;listId='notes-list-combo';}
  else if(ctx==='mac'){id1=selectedMacId;id2=null;listId='notes-list-mac';}
  else if(ctx==='fw'){id1=selectedFWId;id2=null;listId='notes-list-fw';}
  if(!id1)return;
  const notes=loadNotes(id1,id2||null);
  notes.unshift({date:todayStr(),text:''});
  saveNotes(id1,id2||null,notes);
  renderNotesInto(listId,id1,id2||null);
  setTimeout(()=>{const f=document.querySelector('#'+listId+' .note-text');if(f)f.focus();},80);
}
function updateNoteDate(id1,id2,idx,val){const n=loadNotes(id1,id2||null);if(n[idx])n[idx].date=val;saveNotes(id1,id2||null,n);}
function updateNoteText(id1,id2,idx,val){const n=loadNotes(id1,id2||null);if(n[idx])n[idx].text=val;saveNotes(id1,id2||null,n);}
function deleteNote(id1,id2,idx,listId){const n=loadNotes(id1,id2||null);n.splice(idx,1);saveNotes(id1,id2||null,n);renderNotesInto(listId,id1,id2||null);}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderIngGrid(null);
</script>
